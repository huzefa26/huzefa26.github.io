# Experience & Education timeline displayed on the homepage.
# Each entry renders as a timeline item (reuses the theme's home-list styles).
# Swap the placeholder values with real content.
#
# Fields:
#   date        String shown on the left (e.g. "2022 – Present").
#   logo        Optional image path under /static (e.g. "/images/logos/acme.svg").
#   title       Main heading (company or institution name).
#   subtitle    Role / degree line.
#   location    Optional location line.
#   bullets     Optional list of bullet points.
#   type        "experience" (default) or "education".

